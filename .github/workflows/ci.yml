name: CI
on:
  push:
    branches:
      - main
  pull_request:
  schedule:
    - cron:  '0 0 1 * *'

jobs:
  Linux:
    name: Mlucas Linux

    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04, ubuntu-26.04, ubuntu-22.04-arm, ubuntu-24.04-arm, ubuntu-26.04-arm]
        cc: [gcc, clang]
      fail-fast: false
    env:
      CC: ${{ matrix.cc }}
    steps:
    - uses: actions/checkout@v7
    - name: Install
      run: |
        sudo apt-get update -y
        sudo apt-get install -y libhwloc-dev
    - name: Before script
      run: |
        $CC --version
        if [[ $HOSTTYPE == aarch64 ]]; then
            $CC -dM -E -mcpu=native - </dev/null
        else
            $CC -dM -E -march=native - </dev/null
        fi
    - name: Script
      run: |
        set -x
        set -o pipefail
        lscpu
        cat /proc/cpuinfo
        MODES=( '' NOSIMD )
        run_avx512=1
        if [[ $HOSTTYPE == aarch64 ]]; then
            MODES+=( ASIMD )
        else
            MODES+=( SSE2 AVX AVX2 AVX512 )
            # GitHub runners can build AVX-512 but often cannot execute it (SIGILL at runtime). Probe
            # whether AVX-512 actually runs here; if not, skip running the AVX-512-mode test binaries
            # below (they are still built above, for compile coverage):
            if echo 'int main(void){__asm__ __volatile__("vpxord %%zmm0,%%zmm0,%%zmm0":::"zmm0");return 0;}' | ${CC:-cc} -mavx512f -x c -o conftest_avx512run - >/dev/null 2>&1 && ./conftest_avx512run >/dev/null 2>&1; then
                run_avx512=1
            else
                run_avx512=0
                echo "::warning title=AVX-512 execution skipped::this runner's CPU cannot execute AVX-512; AVX-512-mode test binaries were built but will not be run."
            fi
            rm -f conftest_avx512run
        fi
        for mode in "${MODES[@]}"; do
            echo -e "\n$mode\n"
            bash -e -o pipefail -- makemake.sh use_hwloc $mode
            (cd obj${mode:+_$mode}; make clean)
            for word in '' 1word 2word 3word 4word nword; do
                echo -e "\nMfactor $word\n"
                bash -e -o pipefail -- makemake.sh mfac $word $mode
                (
                    cd obj_mfac${mode:+_$mode}
                    make clean
                    mv -v build.log build_${word}.log
                    if [[ -x Mfactor${word:+_$word} ]]; then
                        if [[ $HOSTTYPE == aarch64 || $HOSTTYPE == arm64 ]]; then
                            # Mfactor trial-factoring (hence its test_fac self-test) is not supported on
                            # ARMv8 - it asserts "No TF support on ARMv8!" - so just smoke-test the binary.
                            ./Mfactor${word:+_$word} -h
                        elif [[ "$mode" == AVX512 && "$run_avx512" == 0 ]]; then
                            echo "Skipping execution of AVX-512 Mfactor${word:+_$word}: this runner's CPU cannot run AVX-512."
                        else
                            # Exercise Mfactor's built-in test_fac() self-test (see #82) rather than just -h:
                            # M(127) has no factors <= 2^20 so the trial-factoring pass is quick. We tolerate the
                            # run's own exit status and instead assert the self-test success marker, so a
                            # test_fac regression fails the job.
                            ./Mfactor${word:+_$word} -m 127 -bmax 20 2>&1 | tee "mfac_selftest_${word:-none}.log" || true
                            grep -q 'self-tests completed successfully' "mfac_selftest_${word:-none}.log"
                        fi
                    fi
                )
            done
        done
        cd obj
        echo -e '## Warnings\n```' >> $GITHUB_STEP_SUMMARY
        grep 'warning:' build.log | sed 's/\x1B\[\([0-9]\+\(;[0-9]\+\)*\)\?[mK]//g' | awk '{ print $NF }' | sort | uniq -c | sort -nr >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY
        for s in tt t s m l; do time ./Mlucas -s $s -cpu "0:$(( $(nproc --all) - 1 ))" |& tee -a test.log; done
        for s in tt t s; do time ./Mlucas -prp -s $s -cpu "0:$(( $(nproc --all) - 1 ))" |& tee -a test.log; done
        if [[ $HOSTTYPE == aarch64 ]]; then
            cd ../obj_NOSIMD
        fi
        bash -e -o pipefail -- ../config-fermat.sh -cpu "0:$(( $(nproc --all) - 1 ))"
    - uses: actions/upload-artifact@v7
      if: always()
      with:
        name: ${{ matrix.os }}_${{ matrix.cc }}_mlucas
        path: ${{ github.workspace }}

  Singlethread-Linux:
    name: Mlucas Singlethreaded Linux

    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm]
        cc: [gcc, clang]
      fail-fast: false
    env:
      CC: ${{ matrix.cc }}
    steps:
    - uses: actions/checkout@v7
    - name: Before script
      run: |
        sed -i 's/-DUSE_THREADS//' makemake.sh
        $CC --version
    - name: Script
      run: |
        set -x
        MODES=( '' NOSIMD )
        run_avx512=1
        if [[ $HOSTTYPE == aarch64 ]]; then
            MODES+=( ASIMD )
        else
            MODES+=( SSE2 AVX AVX2 AVX512 )
            # GitHub runners can build AVX-512 but often cannot execute it (SIGILL at runtime). Probe
            # whether AVX-512 actually runs here; if not, skip running the AVX-512-mode test binaries
            # below (they are still built above, for compile coverage):
            if echo 'int main(void){__asm__ __volatile__("vpxord %%zmm0,%%zmm0,%%zmm0":::"zmm0");return 0;}' | ${CC:-cc} -mavx512f -x c -o conftest_avx512run - >/dev/null 2>&1 && ./conftest_avx512run >/dev/null 2>&1; then
                run_avx512=1
            else
                run_avx512=0
                echo "::warning title=AVX-512 execution skipped::this runner's CPU cannot execute AVX-512; AVX-512-mode test binaries were built but will not be run."
            fi
            rm -f conftest_avx512run
        fi
        for mode in "${MODES[@]}"; do
            echo -e "\n$mode\n"
            bash -e -o pipefail -- makemake.sh $mode
            (cd obj${mode:+_$mode}; make clean)
            for word in '' 1word 2word 3word 4word nword; do
                echo -e "\nMfactor $word\n"
                bash -e -o pipefail -- makemake.sh mfac $word $mode
                (
                    cd obj_mfac${mode:+_$mode}
                    make clean
                    mv -v build.log build_${word}.log
                    if [[ -x Mfactor${word:+_$word} ]]; then
                        if [[ $HOSTTYPE == aarch64 || $HOSTTYPE == arm64 ]]; then
                            # Mfactor trial-factoring (hence its test_fac self-test) is not supported on
                            # ARMv8 - it asserts "No TF support on ARMv8!" - so just smoke-test the binary.
                            ./Mfactor${word:+_$word} -h
                        elif [[ "$mode" == AVX512 && "$run_avx512" == 0 ]]; then
                            echo "Skipping execution of AVX-512 Mfactor${word:+_$word}: this runner's CPU cannot run AVX-512."
                        else
                            # Exercise Mfactor's built-in test_fac() self-test (see #82) rather than just -h:
                            # M(127) has no factors <= 2^20 so the trial-factoring pass is quick. We tolerate the
                            # run's own exit status and instead assert the self-test success marker, so a
                            # test_fac regression fails the job.
                            ./Mfactor${word:+_$word} -m 127 -bmax 20 2>&1 | tee "mfac_selftest_${word:-none}.log" || true
                            grep -q 'self-tests completed successfully' "mfac_selftest_${word:-none}.log"
                        fi
                    fi
                )
            done
        done
        cd obj
        for s in tt t s m; do time ./Mlucas -s $s; done
        for s in tt t s; do time ./Mlucas -prp -s $s; done
        if [[ $HOSTTYPE == aarch64 ]]; then
            cd ../obj_NOSIMD
        fi
        bash -e -o pipefail -- ../config-fermat.sh
    - uses: actions/upload-artifact@v7
      if: always()
      with:
        name: ${{ matrix.os }}_${{ matrix.cc }}_singlethreaded_mlucas
        path: ${{ github.workspace }}

  Linux-old:
    name: Mlucas Linux old

    runs-on: ${{ matrix.os }}
    container: ${{ matrix.container }}
    strategy:
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm]
        container: ["ubuntu:14.04", "ubuntu:16.04", "ubuntu:18.04", "ubuntu:20.04", "alpine:3.8", "alpine:3.12", "alpine:3.16", "alpine:3.20", "alpine:3.24"]
        cc: [gcc, clang]
      fail-fast: false
    env:
      CC: ${{ matrix.cc }}
    steps:
    # - uses: actions/checkout@v7
    - name: Install
      if: ${{ startsWith(matrix.container, 'ubuntu:') }}
      run: |
        apt-get update
        DEBIAN_FRONTEND=noninteractive apt-get install -y wget build-essential libgmp-dev libhwloc-dev
        echo 'HAVE_HWLOC=1' >> "$GITHUB_ENV"
    - name: Install Clang
      if: ${{ startsWith(matrix.container, 'ubuntu:') && matrix.cc == 'clang' }}
      run: |
        apt-get install -y clang
    - name: Install
      if: ${{ startsWith(matrix.container, 'alpine:') }}
      run: |
        apk update
        apk add bash wget build-base gmp-dev
        if apk add hwloc-dev; then
            echo 'HAVE_HWLOC=1' >> "$GITHUB_ENV"
        fi
    - name: Install Clang
      if: ${{ startsWith(matrix.container, 'alpine:') && matrix.cc == 'clang' }}
      run: |
        apk add clang
    - name: Download
      run: |
        wget "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/archive/$GITHUB_SHA.tar.gz"
        tar -xzvf "$GITHUB_SHA.tar.gz" --strip-components=1
    - name: Before script
      run: |
        $CC --version
        ldd --version || true
    - name: Script
      shell: bash
      run: |
        set -x
        MODES=( '' NOSIMD )
        if [[ $HOSTTYPE == aarch64 ]]; then
            MODES+=( ASIMD )
        else
            MODES+=( SSE2 AVX AVX2 )
            # Only test the AVX-512 build mode if the compiler's assembler can handle the AVX-512 constructs
            # Mlucas's kernels use: the extended registers (zmm16-31/xmm16-31/k0-7). Ancient clang can't -
            # clang 3.8 (ubuntu:16.04) rejects the extended register names ("unknown register name 'xmm30'").
            # (The one AVX-512ER instruction, vrcp28pd, lived in an unused mi64.c routine and is now gated to
            # KNL-only via __AVX512ER__, so plain AVX-512 builds no longer need an ER-capable assembler -
            # which is why clang 5.0 on alpine:3.8 can now build AVX-512.) Probe and skip AVX-512 rather than
            # fail the build on a mode that provably can't work here.
            if echo 'int main(void){__asm__ __volatile__("vpxord %%zmm31,%%zmm31,%%zmm31\n\tvmovdqa64 %%xmm16,%%xmm17\n\tkmovw %%k1,%%eax":::"zmm31","xmm16","xmm17","k1","eax");return 0;}' | "${CC:-gcc}" -mavx512f -x c -o /dev/null - >/dev/null 2>&1; then
                MODES+=( AVX512 )
            else
                echo "::warning title=AVX-512 build skipped::$("${CC:-gcc}" --version | head -n1): its assembler can't handle the AVX-512 extended registers (zmm16-31/xmm16-31/k0-7) Mlucas's kernels need; skipping the AVX-512 build mode."
            fi
        fi
        for mode in "${MODES[@]}"; do
            echo -e "\n$mode\n"
            bash -e -o pipefail -- makemake.sh ${HAVE_HWLOC:+use_hwloc} $mode
            (cd obj${mode:+_$mode}; make clean)
            for word in '' 1word 2word 3word 4word nword; do
                echo -e "\nMfactor $word\n"
                bash -e -o pipefail -- makemake.sh mfac $word $mode
                (
                    cd obj_mfac${mode:+_$mode}
                    make clean
                    mv -v build.log build_${word}.log
                )
            done
        done

  ASan-Linux:
    name: AddressSanitizer Linux

    runs-on: ubuntu-latest
    strategy:
      matrix:
        cc: [gcc, clang]
      fail-fast: false
    env:
      CC: ${{ matrix.cc }}
    steps:
    - uses: actions/checkout@v7
    - name: Install
      run: |
        sudo apt-get update -y
        sudo apt-get install -y libhwloc-dev
    - name: Before script
      run: |
        sed -i 's/-O3 -flto/-Og -fsanitize=address,undefined/' makemake.sh
        sed -i 's/^MAX=29/MAX=28/' config-fermat.sh
        $CC --version
    - name: Script
      run: |
        set -x
        # Build NOSIMD under the sanitizer (see PR #71 discussion): testing the hand-tuned
        # SIMD asm under ASan/UBSan adds little, and on macOS it fails to assemble under -Og
        # ("invalid CFI advance_loc expression"). NOSIMD exercises the same C-level logic.
        bash -e -o pipefail -- makemake.sh use_hwloc nosimd
        (cd obj_nosimd; make clean)
        for word in '' 1word 2word 3word 4word nword; do
            echo -e "\nMfactor $word\n"
            bash -e -o pipefail -- makemake.sh mfac $word nosimd
            (
                cd obj_mfac_nosimd
                make clean
                mv -v build.log build_${word}.log
            )
        done
        cd obj_nosimd
        for s in tt t s m; do time ./Mlucas -s $s -cpu "0:$(( $(nproc --all) - 1 ))"; done
        for s in tt t s; do time ./Mlucas -prp -s $s -cpu "0:$(( $(nproc --all) - 1 ))"; done
        bash -e -o pipefail -- ../config-fermat.sh -cpu "0:$(( $(nproc --all) - 1 ))"
        cd ../obj_mfac_nosimd
        for word in '' 1word 2word 3word 4word nword; do time ./Mfactor${word:+_$word} -m 127 -bmax 20; done

  TSan-Linux:
    name: ThreadSanitizer Linux

    runs-on: ubuntu-latest
    strategy:
      matrix:
        cc: [gcc, clang]
        exclude:
          - cc: gcc # Too slow
      fail-fast: false
    env:
      CC: ${{ matrix.cc }}
    steps:
    - uses: actions/checkout@v7
    - name: Install
      run: |
        sudo apt-get update -y
        sudo apt-get install -y libhwloc-dev
    - name: Before script
      run: |
        echo "CFLAGS=-fdiagnostics-color -Wall -g -Og -fsanitize=thread" >> "$GITHUB_ENV"
        $CC --version
    - name: Script
      run: |
        set -x
        bash -e -o pipefail -- makemake.sh use_hwloc
        cd obj
        make clean
        time ./Mlucas -s m -cpu "0:$(( $(nproc --all) - 1 ))"
      continue-on-error: true

  GCC-analyzer:
    name: GCC analyzer

    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7
    - name: GCC analyzer
      run: |
        set -x
        set -o pipefail
        gcc -c -fdiagnostics-color -std=gnu99 -g -O3 -march=native -DUSE_THREADS -fanalyzer src/*.c |& tee analyzer.log
        rm -- *.o
        echo -e '## GCC analyzer\n```' >> $GITHUB_STEP_SUMMARY
        grep 'warning:' analyzer.log | sed 's/\x1B\[\([0-9]\+\(;[0-9]\+\)*\)\?[mK]//g' | awk '{ print $NF }' | sort | uniq -c | sort -nr >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY

  Clang-Tidy:
    name: Clang-Tidy

    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7
    - name: Install
      run: |
        sudo apt-get update -y
        sudo apt-get install -y libhwloc-dev
    - name: Clang-Tidy
      run: |
        set -x
        set -o pipefail
        clang-tidy --use-color -checks='bugprone-*,-bugprone-reserved-identifier,cert-*,clang-analyzer-*,concurrency-*,misc-*,-misc-no-recursion,-misc-confusable-identifiers,performance-*,portability-*,readability-const-return-type,readability-container-*,readability-duplicate-include,readability-else-after-return,readability-make-member-function-cons,readability-non-const-parameter,readability-redundant-*,readability-simplify-*,readability-string-compare,readability-use-*' -header-filter='.*' src/*.c -- -std=gnu99 -Wall -O3 -march=native -DUSE_THREADS -DINCLUDE_HWLOC=1 |& tee clang-tidy.log
        echo -e '## Clang-Tidy\n```' >> $GITHUB_STEP_SUMMARY
        grep 'warning:' clang-tidy.log | sed 's/\x1B\[\([0-9]\+\(;[0-9]\+\)*\)\?[mK]//g' | awk '{ print $NF }' | sort | uniq -c | sort -nr >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY

  Cppcheck:
    name: Cppcheck

    runs-on: ubuntu-22.04 # ubuntu-latest
    steps:
    - uses: actions/checkout@v7
    - name: Install
      run: |
        sudo apt-get update -y
        sudo apt-get install -y cppcheck libhwloc-dev
    - name: Cppcheck
      run: |
        mkdir build
        cppcheck --std=c99 --enable=all -DUSE_THREADS -DINCLUDE_HWLOC=1 --force --cppcheck-build-dir=build -j "$(nproc)" --clang .
        cppcheck --std=c99 --enable=all -DUSE_THREADS -DINCLUDE_HWLOC=1 --force --cppcheck-build-dir=build --clang . &> cppcheck.log
        echo -e '## Cppcheck\n```' >> $GITHUB_STEP_SUMMARY
        grep '\(error\|warning\|style\|performance\|portability\|information\):' cppcheck.log | awk '{ print $2, $NF }' | sort | uniq -c | sort -nr >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY

  ShellCheck:
    name: ShellCheck

    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7
    - name: ShellCheck
      run: shopt -s globstar; shellcheck -o avoid-nullary-conditions,check-set-e-suppressed,deprecate-which,quote-safe-variables,require-double-brackets -s bash **/*.sh
      continue-on-error: true

  macOS:
    name: Mlucas macOS

    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-14, macos-15-intel, macos-15, macos-26]
      fail-fast: false
    steps:
    - uses: actions/checkout@v7
    - name: Install
      run: |
        brew install hwloc
    - name: Before script
      run: |
        clang --version
        if (( $(sysctl -n hw.optional.neon) )); then
            clang -dM -E -mcpu=native - </dev/null
        else
            clang -dM -E -march=native - </dev/null
        fi
    - name: Script
      run: |
        set -x
        set -o pipefail
        sysctl -a
        MODES=( '' NOSIMD )
        run_avx512=1
        if (( $(sysctl -n hw.optional.neon) )); then
            MODES+=( ASIMD )
        else
            MODES+=( SSE2 AVX AVX2 AVX512 )
            # GitHub runners can build AVX-512 but often cannot execute it (SIGILL at runtime). Probe
            # whether AVX-512 actually runs here; if not, skip running the AVX-512-mode test binaries
            # below (they are still built above, for compile coverage):
            if echo 'int main(void){__asm__ __volatile__("vpxord %%zmm0,%%zmm0,%%zmm0":::"zmm0");return 0;}' | ${CC:-cc} -mavx512f -x c -o conftest_avx512run - >/dev/null 2>&1 && ./conftest_avx512run >/dev/null 2>&1; then
                run_avx512=1
            else
                run_avx512=0
                echo "::warning title=AVX-512 execution skipped::this runner's CPU cannot execute AVX-512; AVX-512-mode test binaries were built but will not be run."
            fi
            rm -f conftest_avx512run
        fi
        for mode in "${MODES[@]}"; do
            echo -e "\n$mode\n"
            bash -e -o pipefail -- makemake.sh use_hwloc $mode
            (cd obj${mode:+_$mode}; make clean)
            for word in '' 1word 2word 3word 4word nword; do
                echo -e "\nMfactor $word\n"
                bash -e -o pipefail -- makemake.sh mfac $word $mode
                (
                    cd obj_mfac${mode:+_$mode}
                    make clean
                    mv -v build.log build_${word}.log
                    if [[ -x Mfactor${word:+_$word} ]]; then
                        if [[ $HOSTTYPE == aarch64 || $HOSTTYPE == arm64 ]]; then
                            # Mfactor trial-factoring (hence its test_fac self-test) is not supported on
                            # ARMv8 - it asserts "No TF support on ARMv8!" - so just smoke-test the binary.
                            ./Mfactor${word:+_$word} -h
                        elif [[ "$mode" == AVX512 && "$run_avx512" == 0 ]]; then
                            echo "Skipping execution of AVX-512 Mfactor${word:+_$word}: this runner's CPU cannot run AVX-512."
                        else
                            # Exercise Mfactor's built-in test_fac() self-test (see #82) rather than just -h:
                            # M(127) has no factors <= 2^20 so the trial-factoring pass is quick. We tolerate the
                            # run's own exit status and instead assert the self-test success marker, so a
                            # test_fac regression fails the job.
                            ./Mfactor${word:+_$word} -m 127 -bmax 20 2>&1 | tee "mfac_selftest_${word:-none}.log" || true
                            grep -q 'self-tests completed successfully' "mfac_selftest_${word:-none}.log"
                        fi
                    fi
                )
            done
        done
        cd obj
        echo -e '## Warnings\n```' >> $GITHUB_STEP_SUMMARY
        grep 'warning:' build.log | sed 's/\x1B\[\([0-9]\+\(;[0-9]\+\)*\)\?[mK]//g' | grep -v '^ld:' | awk '{ print $NF }' | sort | uniq -c | sort -nr >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY
        for s in tt t s m l; do time ./Mlucas -s $s -cpu "0:$(( $(sysctl -n hw.ncpu) - 1 ))" 2>&1 | tee -a test.log; done
        for s in tt t s; do time ./Mlucas -prp -s $s -cpu "0:$(( $(sysctl -n hw.ncpu) - 1 ))" 2>&1 | tee -a test.log; done
        if (( $(sysctl -n hw.optional.neon) )); then
            cd ../obj_NOSIMD
        fi
        bash -e -o pipefail -- ../config-fermat.sh -cpu "0:$(( $(sysctl -n hw.ncpu) - 1 ))"
    - uses: actions/upload-artifact@v7
      if: always()
      with:
        name: ${{ matrix.os }}_mlucas
        path: ${{ github.workspace }}

  Singlethread-macOS:
    name: Mlucas Singlethreaded macOS

    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-15-intel, macos-latest]
      fail-fast: false
    steps:
    - uses: actions/checkout@v7
    - name: Before script
      run: |
        sed -i '' 's/-DUSE_THREADS//' makemake.sh
        clang --version
    - name: Script
      run: |
        set -x
        MODES=( '' NOSIMD )
        run_avx512=1
        if (( $(sysctl -n hw.optional.neon) )); then
