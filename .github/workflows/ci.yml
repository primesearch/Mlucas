                run_avx512=1
            else
                run_avx512=0
                echo "::warning title=AVX-512 execution skipped::this runner's CPU cannot execute AVX-512; AVX-512-mode test binaries were built but will not be run."
            fi
            rm -f conftest_avx512run
        fi
        for mode in "${MODES[@]}"; do
            echo -e "\n$mode\n"
            bash -e -o pipefail -- makemake.sh $mode
            (cd obj${mode:+_$mode}; make clean)
            for word in '' 1word 2word 3word 4word nword; do
                echo -e "\nMfactor $word\n"
                bash -e -o pipefail -- makemake.sh mfac $word $mode
                (
                    cd obj_mfac${mode:+_$mode}
                    make clean
                    mv -v build.log build_${word}.log
                    if [[ -x Mfactor${word:+_$word} ]]; then
                        if [[ $HOSTTYPE == aarch64 || $HOSTTYPE == arm64 ]]; then
                            # Mfactor trial-factoring (hence its test_fac self-test) is not supported on
                            # ARMv8 - it asserts "No TF support on ARMv8!" - so just smoke-test the binary.
                            ./Mfactor${word:+_$word} -h
                        elif [[ "$mode" == AVX512 && "$run_avx512" == 0 ]]; then
                            echo "Skipping execution of AVX-512 Mfactor${word:+_$word}: this runner's CPU cannot run AVX-512."
                        else
                            # Exercise Mfactor's built-in test_fac() self-test (see #82) rather than just -h:
                            # M(127) has no factors <= 2^20 so the trial-factoring pass is quick. We tolerate the
                            # run's own exit status and instead assert the self-test success marker, so a
                            # test_fac regression fails the job.
                            ./Mfactor${word:+_$word} -m 127 -bmax 20 2>&1 | tee "mfac_selftest_${word:-none}.log" || true
                            grep -q 'self-tests completed successfully' "mfac_selftest_${word:-none}.log"
                        fi
                    fi
                )
            done
        done
        cd obj
        for s in tt t s m; do time ./Mlucas -s $s; done
        for s in tt t s; do time ./Mlucas -prp -s $s; done
        if (( $(sysctl -n hw.optional.neon) )); then
            cd ../obj_NOSIMD
        fi
        bash -e -o pipefail -- ../config-fermat.sh
    - uses: actions/upload-artifact@v7
      if: always()
      with:
        name: ${{ matrix.os }}_singlethreaded_mlucas
        path: ${{ github.workspace }}

  ASan-macOS:
    name: AddressSanitizer macOS

    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v7
    - name: Install
      run: |
        brew install hwloc
    - name: Before script
      run: |
        sed -i '' 's/-O3 -flto/-Og -fsanitize=address,undefined/' makemake.sh
        sed -i '' 's/^MAX=29/MAX=28/' config-fermat.sh
        clang --version
    - name: Script
      run: |
        set -x
        # Build NOSIMD under the sanitizer (see PR #71 discussion): testing the hand-tuned
        # SIMD asm under ASan/UBSan adds little, and on macOS it fails to assemble under -Og
        # ("invalid CFI advance_loc expression"). NOSIMD exercises the same C-level logic.
        bash -e -o pipefail -- makemake.sh use_hwloc nosimd
        (cd obj_nosimd; make clean)
        for word in '' 1word 2word 3word 4word nword; do
            echo -e "\nMfactor $word\n"
            bash -e -o pipefail -- makemake.sh mfac $word nosimd
            (
                cd obj_mfac_nosimd
                make clean
                mv -v build.log build_${word}.log
            )
        done
        cd obj_nosimd
        for s in tt t s m; do time ./Mlucas -s $s -cpu "0:$(( $(sysctl -n hw.ncpu) - 1 ))"; done
        for s in tt t s; do time ./Mlucas -prp -s $s -cpu "0:$(( $(sysctl -n hw.ncpu) - 1 ))"; done
        bash -e -o pipefail -- ../config-fermat.sh -cpu "0:$(( $(sysctl -n hw.ncpu) - 1 ))"
        cd ../obj_mfac_nosimd
        for word in '' 1word 2word 3word 4word nword; do time ./Mfactor${word:+_$word} -m 127 -bmax 20; done

  TSan-macOS:
    name: ThreadSanitizer macOS
    if: false # Too slow

    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v7
    - name: Install
      run: |
        brew install hwloc
    - name: Before script
      run: |
        echo "CFLAGS=-fdiagnostics-color -Wall -g -Og -fsanitize=thread" >> "$GITHUB_ENV"
        clang --version
    - name: Script
      run: |
        set -x
        bash -e -o pipefail -- makemake.sh use_hwloc
        cd obj
        make clean
        time ./Mlucas -s m -cpu "0:$(( $(sysctl -n hw.ncpu) - 1 ))"
      continue-on-error: true

  Windows:
    name: Windows

    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest]
        cc: [gcc, clang]
        include:
          - os: windows-11-arm
            cc: gcc
      fail-fast: false
    env:
      CC: ${{ matrix.cc }}
      PACKAGE_PREFIX: mingw-w64-${{ endsWith(matrix.os, '-arm') && 'clang-aarch64' || 'x86_64' }}-
    steps:
    - uses: actions/checkout@v7
    - name: Before Install
      run: |
        echo "C:\msys64\mingw64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
        echo "C:\msys64\usr\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
        echo "CPPFLAGS=-IC:\msys64\mingw64\include" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
        echo "LDFLAGS=-LC:\msys64\mingw64\lib" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
    - name: Install
      if: ${{ ! endsWith(matrix.os, '-arm') }}
      run: |
        pacman -S --noconfirm "${env:PACKAGE_PREFIX}gmp" "${env:PACKAGE_PREFIX}hwloc"
        & $env:CC --version
    - name: Install Clang
      if: ${{ matrix.cc == 'clang' }}
      run: |
        pacman -S --noconfirm "${env:PACKAGE_PREFIX}clang"
    - name: Before script
      shell: bash
      run: |
        $CC --version
        # The windows-11-arm runner ships no native aarch64 toolchain (no MSYS2/CLANGARM64), so its
        # "gcc" is really an x86_64-w64-mingw32 compiler running under emulation. Both $HOSTTYPE
        # (x86_64) and the matrix OS label (arm) mislead here, so key the arch off what the compiler
        # itself targets:
        if [[ "$($CC -dM -E - </dev/null)" == *__aarch64__* ]]; then
            $CC -dM -E -mcpu=native - </dev/null
        else
            $CC -dM -E -march=native - </dev/null
        fi
    - name: Script
      shell: bash
      run: |
        set -x
        MODES=( '' NOSIMD )
        # The windows-11-arm runner ships no native aarch64 toolchain, so its "gcc" actually targets
        # x86_64 (run under emulation); detect the arch the compiler targets rather than the matrix OS
        # label or $HOSTTYPE, both of which say the wrong thing on that runner:
        run_avx512=1
        if [[ "$($CC -dM -E - </dev/null)" == *__aarch64__* ]]; then
            MODES+=( ASIMD )
        else
            MODES+=( SSE2 AVX AVX2 AVX512 )
            # The AVX-512 mode compiles fine here (the assembler handles the extended registers). But
            # GitHub's Windows runner CPUs are AVX2-only, so the built AVX-512 binaries hit SIGILL when
            # run. Probe whether baseline AVX-512 actually executes here; if not, still build the mode
            # (compile-time coverage) but skip running its test binaries below.
            if echo 'int main(void){__asm__ __volatile__("vpxord %%zmm0,%%zmm0,%%zmm0":::"zmm0");return 0;}' | "${CC:-gcc}" -mavx512f -x c -o conftest_avx512run - >/dev/null 2>&1 && ./conftest_avx512run >/dev/null 2>&1; then
                run_avx512=1
            else
                run_avx512=0
                echo "::warning title=AVX-512 execution skipped::$("${CC:-gcc}" --version | head -n1): this runner's CPU cannot execute AVX-512; building the AVX-512 mode for compile coverage but not running its test binaries."
            fi
            rm -f conftest_avx512run conftest_avx512run.exe
        fi
        for mode in "${MODES[@]}"; do
            echo -e "\n$mode\n"
            bash -e -o pipefail -- makemake.sh ${{ endsWith(matrix.os, '-arm') && 'no_gmp' || 'use_hwloc' }} $mode
            (cd obj${mode:+_$mode}; make clean)
            for word in '' 1word 2word 3word 4word nword; do
                echo -e "\nMfactor $word\n"
                # The windows-11-arm runner has no GMP installed (the Install step is x86-only), so the
                # Mfactor build must also request no_gmp there, exactly as the main build above does:
                bash -e -o pipefail -- makemake.sh mfac ${{ endsWith(matrix.os, '-arm') && 'no_gmp' || '' }} $word $mode
                (
                    cd obj_mfac${mode:+_$mode}
                    make clean
                    mv -v build.log build_${word}.log
                    if [[ -x Mfactor${word:+_$word} ]]; then
                        if [[ $HOSTTYPE == aarch64 || $HOSTTYPE == arm64 ]]; then
                            # Mfactor trial-factoring (hence its test_fac self-test) is not supported on
                            # ARMv8 - it asserts "No TF support on ARMv8!" - so just smoke-test the binary.
                            ./Mfactor${word:+_$word} -h
                        elif [[ "$mode" == AVX512 && "$run_avx512" == 0 ]]; then
                            echo "Skipping execution of AVX-512 Mfactor${word:+_$word}: this runner's CPU cannot run AVX-512."
                        else
                            # Exercise Mfactor's built-in test_fac() self-test (see #82) rather than just -h:
                            # M(127) has no factors <= 2^20 so the trial-factoring pass is quick. We tolerate the
                            # run's own exit status and instead assert the self-test success marker, so a
                            # test_fac regression fails the job.
                            ./Mfactor${word:+_$word} -m 127 -bmax 20 2>&1 | tee "mfac_selftest_${word:-none}.log" || true
                            grep -q 'self-tests completed successfully' "mfac_selftest_${word:-none}.log"
                        fi
                    fi
                )
            done
        done
        cd obj
        for s in tt t s m l; do time ./Mlucas -s $s -cpu "0:$(( NUMBER_OF_PROCESSORS - 1 ))" |& tee -a test.log; done
        for s in tt t s; do time ./Mlucas -prp -s $s -cpu "0:$(( NUMBER_OF_PROCESSORS - 1 ))" |& tee -a test.log; done
        if [[ $HOSTTYPE == aarch64 ]]; then
            cd ../obj_NOSIMD
        fi
        bash -e -o pipefail -- ../config-fermat.sh -cpu "0:$(( NUMBER_OF_PROCESSORS - 1 ))"
    - uses: actions/upload-artifact@v7
      if: always()
      with:
        name: ${{ matrix.os }}_${{ matrix.cc }}_mlucas
        path: ${{ github.workspace }}

  ASan-Windows:
    name: AddressSanitizer Windows

    runs-on: windows-latest
    continue-on-error: true
    env:
      CC: clang
      PACKAGE_PREFIX: mingw-w64-clang-x86_64-
    steps:
